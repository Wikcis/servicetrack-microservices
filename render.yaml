    name: technician-service
    env: docker
    dockerfilePath: ./technician-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: FRONTEND_URL
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: servicetrack-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: servicetrack-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: servicetrack-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: servicetrack-db
          property: password

  # 4. Service Order Service
  - type: web
    name: serviceorder-service
    env: docker
    dockerfilePath: ./serviceorder-service/Dockerfile
