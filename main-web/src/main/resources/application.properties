spring.profiles.active=${SPRING_PROFILES_ACTIVE:docker}
security.jwt.expiration-time=3600000

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:servicetrack}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}

allowed.origin.url=${FRONTEND_URL:http://localhost:3000}
cors.allowed.methods=*
cors.allowed.headers=*
cors.allow.credentials=true